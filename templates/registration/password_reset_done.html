{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Correo enviado</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #071a2d 0%,
                #0b2945 30%,
                #114d6e 65%,
                #1b6e8f 100%
            );

            overflow:hidden;
        }

        .card{

            width:430px;

            padding:45px;

            border-radius:24px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,0.18);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.35);

            color:white;

            text-align:center;
        }

        .card img{

            width:90px;

            margin-bottom:20px;
        }

        h1{

            font-size:28px;

            margin-bottom:20px;
        }

        p{

            line-height:1.8;

            color:rgba(255,255,255,0.85);

            margin-bottom:30px;
        }

        .btn{

            display:inline-block;

            padding:14px 28px;

            border-radius:14px;

            text-decoration:none;

            background:
            linear-gradient(
                135deg,
                #ff7b00,
                #ffb703
            );

            color:white;

            font-weight:600;

            transition:0.3s;
        }

        .btn:hover{

            transform:translateY(-3px);
        }

    </style>

</head>

<body>

    <div class="card">

        <img src="{% static 'logos/logo_universidad.png' %}"
             alt="Logo">

        <h1>Correo enviado</h1>

        <p>

            Se enviaron instrucciones para recuperar
            tu contraseña al correo registrado.

            Revisa tu bandeja de entrada.

        </p>

        <a href="{% url 'login' %}"
           class="btn">

            Volver al login

        </a>

    </div>

</body>

</html>
