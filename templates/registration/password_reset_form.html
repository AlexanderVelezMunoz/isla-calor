{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recuperar contraseña</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            background:
            linear-gradient(
                135deg,
                #071a2d 0%,
                #0b2945 30%,
                #114d6e 65%,
                #1b6e8f 100%
            );

            position:relative;
        }

        body::before{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(255,255,255,0.06);

            border-radius:50%;

            top:-200px;
            left:-150px;

            filter:blur(20px);

            animation:float1 10s ease-in-out infinite;
        }

        body::after{

            content:"";

            position:absolute;

            width:500px;
            height:500px;

            background:rgba(255,255,255,0.05);

            border-radius:50%;

            bottom:-180px;
            right:-100px;

            filter:blur(20px);

            animation:float2 12s ease-in-out infinite;
        }

        @keyframes float1{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        @keyframes float2{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        .card{

            width:430px;

            padding:45px;

            border-radius:24px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,0.18);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.35);

            color:white;

            position:relative;

            z-index:10;

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }
        }

        .logo{

            text-align:center;
            margin-bottom:25px;
        }

        .logo img{

            width:90px;
            margin-bottom:15px;
        }

        h1{

            font-size:28px;

            font-weight:700;

            margin-bottom:10px;

            text-align:center;
        }

        .subtitle{

            text-align:center;

            font-size:14px;

            line-height:1.7;

            color:rgba(255,255,255,0.82);

            margin-bottom:35px;
        }

        .form-group{

            margin-bottom:24px;
        }

        label{

            display:block;

            margin-bottom:10px;

            font-size:15px;

            font-weight:500;
        }

        input{

            width:100%;

            padding:15px 18px;

            border:none;

            border-radius:15px;

            background:rgba(255,255,255,0.16);

            color:white;

            font-size:15px;

            outline:none;

            transition:0.3s;
        }

        input:focus{

            background:rgba(255,255,255,0.20);

            transform:scale(1.02);

            box-shadow:
                0 0 0 3px rgba(255,255,255,0.12);
        }

        input::placeholder{

            color:rgba(255,255,255,0.65);
        }

        .btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #ff7b00,
                #ffb703
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.35s;
        }

        .btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 10px 25px rgba(255,183,3,0.35);
        }

        .back{

            margin-top:22px;

            text-align:center;
        }

        .back a{

            color:white;

            text-decoration:none;

            font-size:14px;
        }

        .back a:hover{

            color:#ffb703;
        }

    </style>

</head>

<body>

    <div class="card">

        <div class="logo">

            <img src="{% static 'logos/logo_universidad.png' %}"
                 alt="TDEA">

        </div>

        <h1>Recuperar contraseña</h1>

        <div class="subtitle">

            Ingresa tu correo institucional y el sistema
            enviará instrucciones para restablecer tu contraseña.

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>Correo electrónico</label>

                {{ form.email }}

            </div>

            <button type="submit"
                    class="btn">

                Enviar instrucciones

            </button>

        </form>

        <div class="back">

            <a href="{% url 'login' %}">
                Volver al inicio de sesión
            </a>

        </div>

    </div>

</body>

</html>
