<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Sistema Isla de Calor Urbana
    </title>

    <style>

        body {

            margin: 0;
            padding: 0;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .container {

            width: 95%;
            margin: auto;
            padding: 20px;
        }

        .titulo {

            text-align: center;
            color: #1f2937;
        }

        .panel {

            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;

            box-shadow:
                0px 2px 10px rgba(0,0,0,0.1);
        }

        form {

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        select,
        button {

            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {

            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {

            background: #1d4ed8;
        }

        .mapa {

            text-align: center;
        }

        .mapa img {

            width: 95%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .acciones {

            margin-top: 20px;

            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .footer {

            margin-top: 40px;
            text-align: center;
            color: gray;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="titulo">

        <h1>

            Sistema Web SIG de Isla de Calor Urbana

        </h1>

        <p>

            Medellín - Interpolación IDW

        </p>

    </div>

    <div class="panel">

        <form method="GET"
              action="{% url 'generar_mapa' %}">

            <!-- Año -->
            <select name="anio">

                {% for a in anios %}

                    <option value="{{ a }}">

                        {{ a }}

                    </option>

                {% endfor %}

            </select>

            <!-- Mes -->
            <select name="mes">

                {% for m in meses %}

                    <option value="{{ m.numero }}">

                        {{ m.nombre }}

                    </option>

                {% endfor %}

            </select>

            <!-- Comuna -->
            <select name="comuna">

                <option value="Todas">

                    Todas las comunas

                </option>

                {% for c in comunas %}

                    <option value="{{ c }}">

                        {{ c }}

                    </option>

                {% endfor %}

            </select>

            <button type="submit">

                Generar mapa

            </button>

        </form>

    </div>

    {% if mapa_url %}

    <div class="panel mapa">

        <h2>

            Resultado del análisis térmico

        </h2>

        <img src="{{ mapa_url }}"
             alt="Mapa generado">

        <div class="acciones">

            <!-- PDF -->
            <a href="{{ pdf_url }}" download>

                <button>

                    Descargar PDF

                </button>

            </a>

            <!-- EXCEL -->
            <a href="{{ excel_url }}" download>

                <button>

                    Descargar Excel

                </button>

            </a>

        </div>

    </div>

    {% endif %}

    <div class="footer">

        Proyecto de investigación —
        Alexander Vélez Muñoz —
        Tecnológico de Antioquia

    </div>

</div>

</body>

</html>
